version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soundvault
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/soundvault?schema=public
      JWT_SECRET: ${JWT_SECRET:-soundvault-secret}
      REFRESH_SECRET: ${REFRESH_SECRET:-soundvault-refresh}
      CLIENT_URL: ${CLIENT_URL:-http://localhost}
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
