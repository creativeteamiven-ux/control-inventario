# Backend API - Control de Inventario (SoundVault)
# Sin rootDir para que el build tenga acceso a packages/shared (monorepo).
# Conecta el repo y en el Dashboard añade DATABASE_URL, JWT_SECRET, REFRESH_SECRET, CLIENT_URL.

services:
  - type: web
    runtime: node
    name: control-inventario-api
    region: oregon
    buildCommand: cd packages/shared && npm install && npm run build && cd ../../server && npm install && npx prisma generate && npm run build
    startCommand: cd server && node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # Añadir en el Dashboard: DATABASE_URL, JWT_SECRET, REFRESH_SECRET, CLIENT_URL
